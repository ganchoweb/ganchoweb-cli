name: publish

# Publica o pacote `ganchoweb` no npm ao criar uma tag de versão (ex.: v0.1.0).
# Autenticação via OIDC Trusted Publisher (sem NPM_TOKEN):
# requer `id-token: write` e npm >= 11.5.1. Configure o Trusted Publisher em
# npmjs.com apontando para este repo + este arquivo (publish.yml).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm publish
